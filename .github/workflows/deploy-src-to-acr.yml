name: Build and Push src Image to ACR

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: chat-app

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create src/.env from ENV secret
        shell: bash
        env:
          ENV: ${{ secrets.ENV }}
        run: |
          set -euo pipefail
          if [ -z "${ENV}" ]; then
            echo "ENV secret is empty" >&2
            exit 1
          fi
          printf '%s' "$ENV" > src/.env

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.AZURE_CONTAINER_REGISTRY }}
          username: ${{ secrets.AZURE_CONTAINER_REGISTRY_USERNAME }}
          password: ${{ secrets.AZURE_CONTAINER_REGISTRY_PASSWORD }}

      - name: Build and push Docker image (src only)
        uses: docker/build-push-action@v6
        with:
          context: ./src
          file: ./src/Dockerfile
          push: true
          tags: ${{ secrets.AZURE_CONTAINER_REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Remove temporary src/.env
        if: always()
        shell: bash
        run: rm -f src/.env
