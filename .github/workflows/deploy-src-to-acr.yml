name: Build and Push src Image to ACR

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: chat-app

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create src/.env from ENV secret
        shell: bash
        env:
          ENV: ${{ secrets.ENV }}
        run: |
          set -euo pipefail
          if [ -z "${ENV}" ]; then
            echo "ENV secret is empty" >&2
            exit 1
          fi
          printf '%s' "$ENV" > src/.env

      - name: Log in to Azure Container Registry
        shell: bash
        run: |
          echo "${{ secrets.AZURE_CONTAINER_REGISTRY_PASSWORD }}" | docker login "${{ secrets.AZURE_CONTAINER_REGISTRY }}" --username "${{ secrets.AZURE_CONTAINER_REGISTRY_USERNAME }}" --password-stdin

      - name: Build and push Docker image (src only)
        shell: bash
        run: |
          docker build -f ./src/Dockerfile -t "${{ secrets.AZURE_CONTAINER_REGISTRY }}/${{ env.IMAGE_NAME }}:latest" ./src
          docker push "${{ secrets.AZURE_CONTAINER_REGISTRY }}/${{ env.IMAGE_NAME }}:latest"

      - name: Remove temporary src/.env
        if: always()
        shell: bash
        run: rm -f src/.env
